services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: teamboard-frontend
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - teamboard-net
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: teamboard-backend
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - teamboard-net
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  db:
    image: postgres:16-alpine
    container_name: teamboard-db
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - teamboard-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${DB_USER}", "-d", "${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - teamboard-net
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  portainer:
    image: portainer/portainer-ce:latest
    container_name: teamboard-portainer
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    restart: always
    networks:
      - teamboard-net
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

networks:
  teamboard-net:
    driver: bridge

volumes:
  teamboard-db-data:
  portainer-data:

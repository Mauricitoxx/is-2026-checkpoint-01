<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamBoard App - Grupo (numero)</title>
    <style>
        body { font-family: sans-serif; margin:20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f4f4f4; }
        .status-container { margin-bottom: 10px; font-weight: bold; }
        #status-indicator { padding: 5px 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>TeamBoard - Grupo (numero)</h1>
    <div class="status-container">
        Estado del Servicio Backend:
        <span id="status-indicator">Cargando...</span>
    </div>

    <table>
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Legajos</th>
                <th>Feature</th>
                <th>Servicio</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody id="team-table-body">
            <tr>
                <td colspan="5">Cargando datos del equipo...</td>
            </tr>
        </tbody>
    </table>

    <script src="app.js"></script>
</body>
</html>
